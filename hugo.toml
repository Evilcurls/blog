baseURL = "https://evilcurls.github.io/blog/"
defaultContentLanguage = "zh-cn"
title = "邪恶小卷毛"
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true
theme = "DoIt"

[languages]
  [languages.zh-cn]
    weight = 1
    locale = "zh-CN"
    label = "简体中文"
    hasCJKLanguage = true

    [languages.zh-cn.params]
      description = "a place for my output"
      keywords = ["Blog", "evilcurls"]
      [languages.zh-cn.params.app]
        title = "邪恶小卷毛"
        noFavicon = false
      [languages.zh-cn.params.search]
        enable = true
        type = "fuse"
        contentLength = 4000
        placeholder = "搜索..."
        maxResultLength = 10
        snippetLength = 50
        highlightTag = "em"
        absoluteURL = false
        [languages.zh-cn.params.search.fuse]
          isCaseSensitive = false
          minMatchCharLength = 2
          findAllMatches = false
          location = 0
          threshold = 0.1
          distance = 100
          ignoreLocation = true
          useExtendedSearch = false
          ignoreFieldNorm = false
      [languages.zh-cn.params.home]
        rss = 10
        [languages.zh-cn.params.home.profile]
          enable = true
          avatarURL = "images/avatar.jpg"
          title = "evilcurls"
          subtitle = "hanhuangjiushishen"
          typeit = true
          social = true
        [languages.zh-cn.params.home.posts]
          enable = true
          paginate = 10
      [languages.zh-cn.params.social]
        GitHub = "evilcurls"
        Email="wengsihan13@outlook.com"

    [[languages.zh-cn.menu.main]]
      identifier = "posts"
      name = "文章"
      url = "posts/"
      weight = 1
    [[languages.zh-cn.menu.main]]
      identifier = "tags"
      name = "标签"
      url = "tags/"
      weight = 2
    [[languages.zh-cn.menu.main]]
      identifier = "categories"
      name = "分类"
      url = "categories/"
      weight = 3

[params]
  version = "0.4.X"
  defaultTheme = "auto"
  mainSections = ["posts"]
  dateFormat = "2006-01-02"
  images = ["images/avatar.jpg"]
  enablePWA = false
  license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  [params.app]
    noFavicon = false

  [params.author]
    name = "evilcurls"
    avatar = "images/avatar.jpg"

  [params.header]
    themeChangeMode = "switch"
    [params.header.title]
      name = "邪恶小卷毛"
      typeit = false

  [params.footer]
    enable = true
    hugo = true
    copyright = true
    author = true
    since = 2025
    license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = true
    ruby = true
    fraction = true
    linkToMarkdown = false
    rssFullText = false
    seriesNavigation = true
    enableLastMod = true
    enableWordCount = true
    enableReadingTime = true
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      maxShownLines = 30
      lineNos = true
    [params.page.math]
      enable = true
      blockLeftDelimiter = ""
      blockRightDelimiter = ""
      inlineLeftDelimiter = ""
      inlineRightDelimiter = ""
      copyTex = true
      mhchem = true
    [params.page.share]
      enable = false
    [params.page.comment]
      enable = false
    [params.page.related]
      enable = true
      count = 5

  [params.typeit]
    speed = 100
    cursorSpeed = 1000
    cursorChar = "|"
    duration = -1

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = false
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\\[', '\\]'], ['$$', '$$']]
      inline = [['\\(', '\\)'], ['$', '$']]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

[taxonomies]
  author = "authors"
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "MarkDown"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[permalinks]
  posts = "/posts/:title/"